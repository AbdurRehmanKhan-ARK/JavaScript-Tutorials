<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Profile Analyzer</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Segoe UI", sans-serif;
        background-color: #0d1117;
        color: #e6edf3;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 60px 20px;
      }

      h1 {
        font-size: 22px;
        margin-bottom: 20px;
        color: #58a6ff;
        letter-spacing: 0.5px;
      }

      .search {
        display: flex;
        gap: 8px;
        margin-bottom: 28px;
      }

      input {
        padding: 9px 14px;
        border-radius: 6px;
        border: 1px solid #30363d;
        background-color: #161b22;
        color: #e6edf3;
        font-size: 14px;
        width: 240px;
        outline: none;
        transition: border-color 0.2s;
      }

      input:focus {
        border-color: #58a6ff;
      }

      button {
        padding: 9px 18px;
        background-color: #238636;
        color: #fff;
        border: none;
        border-radius: 6px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: background-color 0.2s;
      }

      button:hover {
        background-color: #2ea043;
      }

      #result {
        width: 100%;
        max-width: 400px;
      }

      .card {
        background-color: #161b22;
        border: 1px solid #30363d;
        border-radius: 10px;
        padding: 24px 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 6px;
        text-align: center;
      }

      .card img {
        width: 80px;
        height: 80px;
        border-radius: 50%;
        border: 2px solid #30363d;
        margin-bottom: 6px;
      }

      .card h2 {
        font-size: 17px;
        font-weight: 600;
      }

      .card .username {
        color: #58a6ff;
        font-size: 13px;
        margin-top: -2px;
      }

      .card .bio {
        font-size: 13px;
        color: #8b949e;
        max-width: 340px;
        line-height: 1.5;
        margin-top: 4px;
      }

      .stats {
        display: flex;
        gap: 10px;
        margin-top: 14px;
        flex-wrap: wrap;
        justify-content: center;
      }

      .stat {
        background-color: #0d1117;
        border: 1px solid #30363d;
        border-radius: 6px;
        padding: 8px 14px;
        font-size: 12px;
        color: #8b949e;
        text-align: center;
        min-width: 72px;
      }

      .stat span {
        display: block;
        font-size: 18px;
        font-weight: 700;
        color: #58a6ff;
        margin-bottom: 2px;
      }

      .location {
        font-size: 12px;
        color: #8b949e;
        margin-top: 2px;
      }

      .error {
        text-align: center;
        color: #f85149;
        font-size: 14px;
        padding: 16px;
      }
    </style>
  </head>
  <body>
    <h1>GitHub Profile Analyzer</h1>

    <div class="search">
      <input
        type="text"
        id="usernameInput"
        placeholder="Enter GitHub username"
      />
      <button id="analyzeBtn">Analyze</button>
    </div>

    <div id="result"></div>

    <script>
      const btn = document.querySelector("#analyzeBtn");
      const input = document.querySelector("#usernameInput");
      const result = document.querySelector("#result");

      btn.addEventListener("click", function () {
        const username = input.value.trim();
        if (!username) return;

        result.innerHTML = `<p style="text-align:center; color:#8b949e;">Loading...</p>`;

        const xhr = new XMLHttpRequest();
        xhr.open("GET", `https://api.github.com/users/${username}`);
        xhr.send();

        xhr.onreadystatechange = function () {
          if (xhr.readyState === 4) {
            const data = JSON.parse(this.responseText);

            if (data.message === "Not Found") {
              result.innerHTML = `<div class="error">User "${username}" not found.</div>`;
              return;
            }

            result.innerHTML = `
              <div class="card">
                <img src="${data.avatar_url}" alt="${data.login}" />

                <h2>${data.name || data.login}</h2>

                <p class="username">@${data.login}</p>
                ${data.bio ? `<p class="bio">${data.bio}</p>` : ""}
                ${
                  data.location
                    ? `<p class="location">📍 ${data.location}</p>`
                    : ""
                }
                <div class="stats">
                  <div class="stat"><span>${data.public_repos}</span>Repos</div>
                  <div class="stat"><span>${data.followers}</span>Followers</div>
                  <div class="stat"><span>${data.following}</span>Following</div>
                </div>
              </div>
            `;
          }
        };
      });
      input.addEventListener("keydown", function (e) {
        if (e.key === "Enter") btn.click();
      });
    </script>
  </body>
</html>

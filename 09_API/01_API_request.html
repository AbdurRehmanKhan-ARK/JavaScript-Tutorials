<!--
The XMLHttpRequest.readyState property returns the state an XMLHttpRequest client is in. An XHR client exists in one of the following states:

Value	State	            Description
0	    UNSENT	            Client has been created. open() not called yet, open() sends the request.
1	    OPENED	            open() has been called.
2	    HEADERS_RECEIVED	send() has been called, and headers and status are available.
3	    LOADING	            Downloading; responseText holds partial data.
4	    DONE	            The operation is complete.

these are ready states in XMLHttpRequest, request in XML is called AJAX request
-->

    // so whenver the state changes, the function will be called 1-2-3-4

    // now comes the task: now extract photo of AbdurRehmanKhan-ARK, some information about him and nake a button on which when user clicks it it shows it the information

    const btn = document.querySelector(".ark");
    btn.addEventListener("click", () => {
      const requestURL = "https://api.github.com/users/AbdurRehmanKhan-ARK";
      const xhr = new XMLHttpRequest();
      xhr.open("GET", requestURL);
      xhr.send();
      console.log(xhr.readyState);
      xhr.onreadystatechange = function () {
        if (xhr.readyState === 4) {
          const data = JSON.parse(this.responseText);
          const div = document.getElementById("data");
          div.innerHTML = `
                <img src="${data.avatar_url}"width="120" style="border-radius: 50%;   margin-top: 20px;"/>
                <h2 style="margin-top: 12px;">${data.name}</h2>
                <p>Public Repos: ${data.public_repos}</p>
                <p>Followers: ${data.followers}</p>
                <p>Location: ${data.location}</p>
              `;
        }
      };
    });

    // lets discuss a well known engine on which JS runs
    // V8 - Google's open source JavaScript engine

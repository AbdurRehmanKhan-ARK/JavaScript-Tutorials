<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JavaScript Background Color Switcher</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <nav>
      <a href="../index.html" class="nav-link">Home</a>
      <a
        target="_blank"
        class="nav-link"
        href="https://www.youtube.com/@chaiaurcode"
        >Youtube Channel</a
      >
    </nav>
    <div class="container">
      <h1>BMI Calculator</h1>
      <form>
        <p>
          <label>Enter Your Height (cm)</label><input type="text" id="height" />
        </p>
        <p>
          <label>Enter Your Weight (kg)</label><input type="text" id="weight" />
        </p>
        <button type="submit">Calculate BMI</button>

        <div id="result">
          <h3>BMI Weight Guide</h3>
          <p>Under-Weight = Less than 18.6</p>
          <p>Normal-Weight = 18.6 to 24.9</p>
          <p>Over-Weight = 25 to 29.9</p>
          <p>Obesity = Above 30</p>
        </div>
      </form>
    </div>
  </body>
  <script src="script.js"></script>
</html>
